# Render Blueprint for the backend.
# Deploy: push to GitHub, then in Render "New +" -> "Blueprint" and point at this repo.
# Set DATABASE_URL (Supabase pooler string) in the dashboard — it is not stored here.
services:
  - type: web
    name: chat-application-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        sync: false # set in the Render dashboard (Supabase pooler connection string)
